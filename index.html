<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Calculadora de Apostas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen">
        <h2>Acesso Protegido</h2>
        <input type="password" id="password" placeholder="Senha">
        <button onclick="checkPassword()">Entrar</button>
    </div>

    <div id="app-screen" style="display:none;">
        <h2>Gestor de Entradas</h2>
        <input type="number" id="oddGol" placeholder="Odd Gol (1.27)">
        <input type="number" id="odd0x0" placeholder="Odd 0x0 (26)">
        <button onclick="calcular()">Calcular Entradas</button>
        <div id="result"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
